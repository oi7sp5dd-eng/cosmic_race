<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Animation</title>
  <style>
    body {
      background-color: transparent;
      color: black;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .typing-container {
      display: flex;
      flex-direction: column;
      font-size: 36px;
      font-weight: 600;
      position: relative;
    }

    .cursor {
      width: 12px;
      height: 12px;
      background-color: black;
      border-radius: 50%;
      position: absolute;
      animation: blink 0.5s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="typing-container">
    <div class="cursor" id="cursor"></div>
    <div id="typed-text"></div>
  </div>

  <script>
    const text = [
      "Тут ви можете пограти в різні ігри, а саме:",
      "- Шлях Світлячка",
      "- Космічна битва",
      "- Змійка",
      "- Вгадай число",
      "- Хрестики-нуліки",
      "- Пінг-понг"
    ];

    const typedTextElement = document.getElementById("typed-text");
    const cursorElement = document.getElementById("cursor");
    let lineIndex = 0;
    let charIndex = 0;

    function updateCursorPosition() {
      const currentLine = typedTextElement.lastElementChild;
      if (currentLine) {
        const rect = currentLine.getBoundingClientRect();
        const textWidth = currentLine.offsetWidth;
        cursorElement.style.top = `${rect.top + window.scrollY}px`;
        cursorElement.style.left = `${rect.left + textWidth}px`;
      }
    }

    function typeText() {
      if (lineIndex < text.length) {
        if (charIndex === 0) {
          const newLine = document.createElement("div");
          typedTextElement.appendChild(newLine);
        }

        const currentLine = typedTextElement.lastElementChild;

        if (charIndex < text[lineIndex].length) {
          currentLine.textContent += text[lineIndex][charIndex];
          charIndex++;
          updateCursorPosition();
          setTimeout(typeText, 100);
        } else {
          lineIndex++;
          charIndex = 0;
          setTimeout(typeText, 300);
        }
      } else {
        cursorElement.style.display = "none";
      }
    }

    updateCursorPosition();
    typeText();
  </script>
</body>
</html>
